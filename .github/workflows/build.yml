name: Build and Release Excel Search Tool

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./ExcelSearchTool/ExcelSearchTool.csproj

      - name: Build project
        run: dotnet build ./ExcelSearchTool/ExcelSearchTool.csproj -c Release --no-restore

      - name: Publish single-file self-contained EXE
        run: dotnet publish ./ExcelSearchTool/ExcelSearchTool.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:DebugType=None /p:DebugSymbols=false -o publish

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: iscc /DMyAppVersion=${{ github.ref_name }} setup.iss

      - name: Upload published EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelSearchTool-exe
          path: publish/ExcelSearchTool.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelSearchTool-installer
          path: installer-out/ExcelSearchTool-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/ExcelSearchTool.exe
            installer-out/ExcelSearchTool-Setup.exe
          generate_release_notes: true
